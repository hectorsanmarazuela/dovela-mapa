<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#f5f0eb; }

.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-logo,.maplibregl-ctrl-attrib { display:none !important; }

#map {
  width:100%; height:100vh;
  cursor:default;
}

/* ── SONAR RINGS ─────────────────────────────────────── */
.sonar-wrap {
  position:absolute;
  width:0; height:0;
  pointer-events:none;
  z-index:2;
}

.sonar-ring {
  position:absolute;
  border-radius:50%;
  transform:translate(-50%,-50%);
  animation: sonarPulse 2.2s ease-out infinite;
  pointer-events:none;
}

.sonar-ring.g { background:rgba(90,150,0,0.80); }
.sonar-ring.o { background:rgba(255,140,0,0.55); }
.sonar-ring.r { background:rgba(220,40,40,0.55); }

@keyframes sonarPulse {
  0%   { width:10px; height:10px; opacity:0.85; }
  100% { width:52px; height:52px; opacity:0; }
}

@keyframes sonarPulseLarge {
  0%   { width:12px; height:12px; opacity:0.95; }
  100% { width:80px; height:80px; opacity:0; }
}

.sonar-ring.has-sym { animation-name: sonarPulseLarge !important; }

/* ── BOUNCE con símbolo ──────────────────────────────── */
.bounce-wrap {
  position:absolute;
  width:0; height:0;
  pointer-events:none;
  z-index:6;
}

.bounce-dot {
  position:absolute;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  font-weight:900;
  line-height:1;
}

.bounce-dot.g {
  width:13px; height:13px;
  background:#C7F751;
  color:rgba(0,0,0,0.75);
  box-shadow:0 0 10px 4px rgba(199,247,81,0.7);
  animation:bounceG 1.6s ease-in-out infinite;
}

.bounce-dot.r {
  width:13px; height:13px;
  background:#e00000;
  color:#fff;
  box-shadow:0 0 10px 4px rgba(220,0,0,0.65);
  animation:bounceR 1.8s ease-in-out infinite;
}

@keyframes bounceG {
  0%,100% { transform:translate(-50%,-50%) translateY(0);     }
  30%     { transform:translate(-50%,-50%) translateY(-18px);  }
  50%     { transform:translate(-50%,-50%) translateY(0);     }
  65%     { transform:translate(-50%,-50%) translateY(-7px);   }
  80%     { transform:translate(-50%,-50%) translateY(0);     }
  90%     { transform:translate(-50%,-50%) translateY(-2px);   }
}

@keyframes bounceR {
  0%,100% { transform:translate(-50%,-50%) translateY(0);     }
  28%     { transform:translate(-50%,-50%) translateY(-16px);  }
  48%     { transform:translate(-50%,-50%) translateY(0);     }
  63%     { transform:translate(-50%,-50%) translateY(-6px);   }
  78%     { transform:translate(-50%,-50%) translateY(0);     }
  88%     { transform:translate(-50%,-50%) translateY(-2px);   }
}

/* ── BADGE en tooltip ────────────────────────────────── */
.tt-badge-top {
  display:inline-block;
  font-size:9px;
  font-weight:800;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:3px 8px;
  border-radius:4px;
  margin-bottom:7px;
}
.tt-badge-top.sg { background:#eeffc0; color:#5a7a00; }
.tt-badge-top.sr { background:#ffe0e0; color:#a80000; }

/* ── TOOLTIP ─────────────────────────────────────────── */
.tt {
  position:fixed;
  background:#fff;
  border-radius:12px;
  padding:14px 15px;
  width:224px;
  pointer-events:auto;
  opacity:0;
  transition:opacity 0.15s;
  z-index:9999;
  box-shadow:0 12px 40px rgba(0,0,0,0.18);
  font-family:'Inter',-apple-system,sans-serif;
  user-select:none;
  cursor:default;
}
.tt.show { opacity:1; }

/* ── AUTO-CARD ───────────────────────────────────────── */
.auto-card {
  position:fixed;
  bottom:32px; right:32px;
  background:#fff;
  border-radius:12px;
  padding:14px 15px;
  width:224px;
  z-index:100;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
  font-family:'Inter',-apple-system,sans-serif;
  user-select:none;
  transition:opacity 0.4s;
  pointer-events:none;
}

.tt-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.tt-tag { font-size:10px; font-weight:700; color:#bbb; text-transform:uppercase; letter-spacing:0.07em; }
.tt-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:100px; }
.tt-badge.g { background:#e6fff3; color:#00884d; }
.tt-badge.o { background:#fff4e6; color:#b35a00; }
.tt-badge.r { background:#fff0f0; color:#cc2200; }
.tt-name { font-size:13px; font-weight:700; color:#0a0a0a; margin-bottom:10px; line-height:1.3; }
.tt-div  { height:1px; background:#f0f0f0; margin-bottom:9px; }
.tt-row { margin-bottom:5px; }
.tt-lbl { font-size:10px; color:#bbb; margin-bottom:1px; }
.tt-val { font-size:12px; font-weight:700; line-height:1.3; }
.tt-val.g { color:#00884d; }
.tt-val.o { color:#b35a00; }
.tt-val.r { color:#cc2200; }
.tt-bar-wrap { background:#efefef; border-radius:4px; height:3px; margin-top:9px; overflow:hidden; }
.tt-bar { height:3px; border-radius:4px; }
.tt-bar.g { background:#00cc66; }
.tt-bar.o { background:#ff8c00; }
.tt-bar.r { background:#ff3333; }
.tt-bar-meta { display:flex; justify-content:space-between; margin-top:3px; }
.tt-bar-meta span   { font-size:10px; color:#ccc; }
.tt-bar-meta strong { font-size:10px; font-weight:700; color:#666; }
.tt-cta {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:10px; padding-top:9px; border-top:1px solid #f0f0f0;
  font-size:11px; font-weight:700; color:#0a0a0a;
  cursor:pointer; text-decoration:none; pointer-events:auto;
}
.tt-cta span { opacity:0.6; }
.tt-cta-arr {
  width:22px; height:22px; background:#c8ff00; border-radius:50%;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

/* Auto-card pulse indicator */
.auto-card {
  display:none;

}
@media (hover:none) and (pointer:coarse) {
  .auto-card { display:block; }

  { n:'Panadería Zamarramala',     t:'Alimentación', lon:-4.1408, lat:40.9555, c:'g', seo:72, sym:null, rows:[['Posición en Google','#2 para "panadería Segovia"','g'],['Web renovada','Posiciona 12 palabras clave','g'],['Alcance mensual','Visible para 180 búsquedas/mes','g']], cta:null },
  { n:'Fontanería Ruiz e Hijos',   t:'Fontanería',   lon:-4.1420, lat:40.9540, c:'r', seo:5,  sym:null, rows:[['Presencia digital','Solo boca a boca, sin presencia online','r'],['Posición en Google','No posiciona para ninguna palabra clave','r'],['Oportunidad perdida','340 búsquedas/mes van a Fontanería Valverde','r']], cta:'¿Tu negocio? Auditoría gratis' },
  // ── SAN JOSÉ ─────────────────────────────────────────────────────────
  { n:'Clínica San José',          t:'Medicina',     lon:-4.1172, lat:40.9425, c:'g', seo:82, sym:null, rows:[['Posición en Google','#1 para "médico Segovia"','g'],['Web renovada','Posiciona 26 palabras clave','g'],['Alcance mensual','Visible para 360 búsquedas/mes','g']], cta:null },
  { n:'Supermercado San José',     t:'Alimentación', lon:-4.1192, lat:40.9412, c:'o', seo:20, sym:null, rows:[['Posición en Google','Sin ficha Google Business optimizada','o'],['Web','Web básica, sin SEO local','o'],['Oportunidad perdida','190 búsquedas/mes van a la competencia','o']], cta:'¿Tu negocio? Auditoría gratis' },
  { n:'Taller San José',           t:'Automoción',   lon:-4.1155, lat:40.9418, c:'r', seo:4,  sym:null, rows:[['Presencia digital','Sin web, sin Google Business','r'],['Posición en Google','No posiciona para ninguna palabra clave','r'],['Oportunidad perdida','230 búsquedas/mes van a la competencia','r']], cta:'¿Tu negocio? Auditoría gratis' },
  // ── LA LASTRILLA ─────────────────────────────────────────────────────
  { n:'Guardería La Lastrilla',    t:'Educación',    lon:-4.1028, lat:40.9448, c:'g', seo:75, sym:null, rows:[['Posición en Google','#2 para "guardería Segovia"','g'],['Web renovada','Posiciona 16 palabras clave','g'],['Resultado','+2× de solicitudes de información','g']], cta:null },
  { n:'Bar Los Pinos',             t:'Hostelería',   lon:-4.1012, lat:40.9460, c:'o', seo:16, sym:null, rows:[['Posición en Google','No aparece en Google Maps','o'],['Web','Sin web, sin ficha Google Business','o'],['Oportunidad perdida','95 búsquedas/mes van a la competencia','o']], cta:'¿Tu negocio? Auditoría gratis' },
  { n:'Fontanería Lastrilla',      t:'Fontanería',   lon:-4.1042, lat:40.9438, c:'r', seo:5,  sym:null, rows:[['Presencia digital','Sin web, sin Google Business','r'],['Posición en Google','No posiciona para ninguna palabra clave','r'],['Impacto','Invisible digitalmente','r']], cta:'¿Tu negocio? Auditoría gratis' },
];

maptilersdk.config.apiKey = 'RK2MOnljqNok3qDnoLAS';

const map = new maptilersdk.Map({
  container: 'map',
  style: `https://api.maptiler.com/maps/019f28f1-d364-76f2-9498-7ae0680cc15c/style.json?key=RK2MOnljqNok3qDnoLAS`,
  center: [-4.1185, 40.9488],
  zoom: 14.8,
  pitch: 58,
  bearing: -22,
  antialias: true,
  attributionControl: false,
  logoControl: false,
  navigationControl: false,
  // ── INTERACCIÓN DESACTIVADA ──
  dragPan: false,
  scrollZoom: false,
  touchZoomRotate: false,
  doubleClickZoom: false,
  keyboard: false,
  dragRotate: false,
  minZoom: 14,
  maxZoom: 16,
});

map.on('load', () => {
  document.querySelectorAll(
    '.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-logo,.maplibregl-ctrl-attrib'
  ).forEach(el => el.remove());

  // ── 3D buildings ─────────────────────────────────────────────────────
  const layers = map.getStyle().layers;
  let labelLayerId;
  for (const l of layers) {
    if (l.type === 'symbol' && l.layout && l.layout['text-field']) { labelLayerId = l.id; break; }
  }

  try {
    map.addLayer({
      id: '3d-buildings',
      source: 'maptiler_planet',
      'source-layer': 'building',
      type: 'fill-extrusion',
      minzoom: 14,
      paint: {
        'fill-extrusion-color': ['interpolate',['linear'],['get','render_height'],0,'#d4cfc8',15,'#c8c2ba',40,'#b8b0a5',80,'#a8a098',150,'#958c80'],
        'fill-extrusion-height':  ['get','render_height'],
        'fill-extrusion-base':    ['get','render_min_height'],
        'fill-extrusion-opacity': 0.85
      }
    }, labelLayerId);
  } catch(e) {}

  // ── GeoJSON source ────────────────────────────────────────────────────
  const geojson = {
    type: 'FeatureCollection',
    features: DATA.map((d, i) => ({
      type: 'Feature',
      id: i,
      geometry: { type: 'Point', coordinates: [d.lon, d.lat] },
      properties: { idx: i, c: d.c, seo: d.seo, sym: d.sym || '' }
    }))
  };

  map.addSource('negocios', { type: 'geojson', data: geojson });

  // Halo estático naranja
  map.addLayer({ id:'halo-o', type:'circle', source:'negocios', filter:['==',['get','c'],'o'],
    paint:{ 'circle-radius':['interpolate',['linear'],['zoom'],13,14,16,22], 'circle-color':'#ff8c00', 'circle-opacity':0.28, 'circle-blur':1.4, 'circle-pitch-alignment':'map' }
  });

  // Halo estático rojo
  map.addLayer({ id:'halo-r', type:'circle', source:'negocios', filter:['==',['get','c'],'r'],
    paint:{ 'circle-radius':['interpolate',['linear'],['zoom'],13,15,16,24], 'circle-color':'#ff3333', 'circle-opacity':0.25, 'circle-blur':1.3, 'circle-pitch-alignment':'map' }
  });

  // Dots — todos estáticos, sin símbolo (el símbolo va en el bounce DOM)
  map.addLayer({
    id: 'negocios-dot', type: 'circle', source: 'negocios',
    paint: {
      'circle-radius': ['interpolate',['linear'],['zoom'],
        13, ['case',['==',['get','c'],'g'],4.2,['==',['get','c'],'o'],3.6,3.0],
        16, ['case',['==',['get','c'],'g'],7.5,['==',['get','c'],'o'],6.4,5.4]
      ],
      'circle-color': ['case',
        ['==',['get','c'],'g'], COLOR.g,
        ['==',['get','c'],'o'], COLOR.o,
        COLOR.r
      ],
      'circle-stroke-width': 1.8,
      'circle-stroke-color': 'rgba(255,255,255,0.9)',
      'circle-opacity': 1
    }
  });

  // ── SONAR RINGS ───────────────────────────────────────────────────────
  const sonarContainer = document.getElementById('map');
  const sonarItems = DATA.map((d, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'sonar-wrap';
    wrap.style.position = 'absolute';
    wrap.style.pointerEvents = 'none';
    wrap.style.zIndex = '2';
    sonarContainer.appendChild(wrap);

    const ring = document.createElement('div');
    ring.className = `sonar-ring ${d.c}${d.special ? ' has-sym' : ''}`;
    const baseSpeed = d.c === 'g' ? 2.0 : d.c === 'o' ? 2.8 : 3.4;
    ring.style.animationDuration = baseSpeed + 's';
    ring.style.animationDelay = (i * 0.18 % baseSpeed) + 's';
    wrap.appendChild(ring);

    return { wrap, lon: d.lon, lat: d.lat };
  });

  // Bounce DOM — solo para markers especiales, con símbolo visible
  const bounceItems = DATA
    .filter(d => d.special)
    .map(d => {
      const wrap = document.createElement('div');
      wrap.className = 'bounce-wrap';
      sonarContainer.appendChild(wrap);
      const dot = document.createElement('div');
      dot.className = `bounce-dot ${d.c}`;
      dot.textContent = d.sym;
      wrap.appendChild(dot);
      return { wrap, lon: d.lon, lat: d.lat };
    });

  const hintTargets = [];

  // ── POSICIONAMIENTO ───────────────────────────────────────────────────
  function updateAllPositions() {
    sonarItems.forEach(({ wrap, lon, lat }) => {
      const pt = map.project([lon, lat]);
      wrap.style.left = pt.x + 'px';
      wrap.style.top  = pt.y + 'px';
    });
    bounceItems.forEach(({ wrap, lon, lat }) => {
      const pt = map.project([lon, lat]);
      wrap.style.left = pt.x + 'px';
      wrap.style.top  = pt.y + 'px';
    });
    hintTargets.forEach(({ el, lon, lat }) => {
      const pt = map.project([lon, lat]);
      el.style.left = pt.x + 'px';
      el.style.top  = pt.y + 'px';
    });
    requestAnimationFrame(updateAllPositions);
  }
  updateAllPositions();

  // ── TOOLTIP ───────────────────────────────────────────────────────────
  const tt = document.getElementById('tt');
  let hideTimer = null;

  tt.addEventListener('mouseenter', () => { if(hideTimer){ clearTimeout(hideTimer); hideTimer=null; } });
  tt.addEventListener('mouseleave', () => { tt.classList.remove('show'); });

  function buildCard(d) {
    const badgeHTML = d.badge ? `<div class="tt-badge-top ${d.c}">${d.badge}</div>` : '';
    const rowsHTML = d.rows.map(r =>
      `<div class="tt-row"><div class="tt-lbl">${r[0]}</div><div class="tt-val ${r[2]}">${r[1]}</div></div>`
    ).join('');
    const ctaHTML = d.cta ? `
      <a class="tt-cta" href="#">
        <span>${d.cta}</span>
        <div class="tt-cta-arr"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 8L8 1M8 1H2.5M8 1V6.5" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </a>` : '';
    return `
      ${badgeHTML}
      <div class="tt-header">
        <div class="tt-tag">${d.t}</div>
        <div class="tt-badge ${d.c}">${LABEL[d.c]}</div>
      </div>
      <div class="tt-name">${d.n}</div>
      <div class="tt-div"></div>
      ${rowsHTML}
      <div class="tt-bar-wrap"><div class="tt-bar ${d.c}" style="width:${d.seo}%"></div></div>
      <div class="tt-bar-meta"><span>SEO Score</span><strong>${d.seo}/100</strong></div>
      ${ctaHTML}`;
  }

  function showTooltip(e) {
    const d = DATA[e.features[0].properties.idx];
    tt.innerHTML = buildCard(d);
    const TW = 234, TH = d.cta ? 218 : 185, OFF = 14;
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = e.point.x + OFF;
    let top  = e.point.y - TH / 2;
    if (left + TW > vw - 10) left = e.point.x - TW - OFF;
    if (top < 8)              top  = 8;
    if (top + TH > vh - 8)   top  = vh - TH - 8;
    tt.style.left = left + 'px';
    tt.style.top  = top  + 'px';
    tt.classList.add('show');
  }

  map.getCanvas().style.cursor = 'default';

  // ── DESKTOP: hover robusto con mousemove ──────────────────────────────
  const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  if (!isMobile) {
    let lastIdx = -1;
    map.on('mousemove', (e) => {
      const features = map.queryRenderedFeatures(e.point, { layers: ['negocios-dot'] });
      if (features.length > 0) {
        const idx = features[0].properties.idx;
        if (idx !== lastIdx) {
          lastIdx = idx;
          if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
          map.getCanvas().style.cursor = 'pointer';
          showTooltip({ features, point: e.point });
        }
      } else {
        if (lastIdx !== -1) {
          lastIdx = -1;
          map.getCanvas().style.cursor = 'default';
          hideTimer = setTimeout(() => tt.classList.remove('show'), 120);
        }
      }
    });
  }

  // Click siempre (mobile tap + desktop)
  map.on('click', 'negocios-dot', (e) => {
    showTooltip({ features: e.features, point: e.point });
  });

  // ── MOBILE: auto-card con los 4 especiales ────────────────────────────
  if (isMobile) {
    const ac = document.getElementById('auto-card');
    const specials = DATA.filter(d => d.special);
    let acIdx = 0;

    function showAutoCard() {
      if (!specials.length) return;
      const d = specials[acIdx % specials.length];
      ac.innerHTML = buildCard(d);
      ac.style.opacity = '1';
      acIdx++;
    }

    showAutoCard();
    setInterval(showAutoCard, 4000);
  }

  // ── ROTACIÓN ─────────────────────────────────────────────────────────
  let bearing = -22;
  (function rotate() {
    bearing -= 0.012;
    map.setBearing(bearing);
    requestAnimationFrame(rotate);
  })();
});
</script>

</html>
